    <!-- ════════════════════════════════════════
         CONTENT SECURITY POLICY (CSP)
         ────────────────────────────────────────
         Browser-enforced fallback. The authoritative CSP should be set as
         an HTTP response header by your CDN / host (see public/_headers,
         vercel.json, and vite.config.js `preview.headers`).

         Allows: Google Analytics (gtag), Hotjar, self-hosted assets.
         Tighten/remove directives if you don't use those providers.
    ════════════════════════════════════════ -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
        object-src 'none';
        img-src 'self' data: https://www.google-analytics.com https://*.hotjar.com;
        font-src 'self' data:;
        style-src 'self' 'unsafe-inline';
        script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://static.hotjar.com https://script.hotjar.com;
        connect-src 'self' https://www.google-analytics.com https://*.analytics.google.com https://*.hotjar.com https://*.hotjar.io wss://*.hotjar.com;
        frame-src https://vars.hotjar.com;
        upgrade-insecure-requests;
      "
    />

    <!-- ════════════════════════════════════════
         FONTS — non-blocking load pattern
         1. Load stylesheet via print media trick (non-render-blocking)
         2. onload switches media to "all" to apply styles
         3. <noscript> fallback for JS-disabled browsers
         font-display=swap: text renders immediately in fallback font,
         swaps to web font when ready — eliminates invisible text (FOIT)
    ════════════════════════════════════════ -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
      />
    </noscript>

    <!-- Inline critical CSS vars so layout doesn't wait for web fonts -->
    <style>
      :root {
        --font-body:    'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-heading: 'Space Grotesk', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    </style>
    <!-- Theme-flash prevention — runs synchronously before first paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('ks-theme');
          if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
          } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.documentElement.setAttribute('data-theme', 'light');
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
